[tool.ruff]
line-length = 80
target-version = "py39"
exclude = [
    ".git",
    ".github",
    ".pytest_cache",
    "venv",
    ".venv",
    ".idea",
    "__pycache__",
    "*.egg-info",
    "build",
]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # do not perform function calls in argument defaults (FastAPI uses this)
    "B904",   # raise from in except — existing codebase pattern, fix incrementally
    "B006",   # mutable default arguments — existing codebase pattern, fix incrementally
    "SIM102", # nested if statements — sometimes clearer than combined conditions
]

[tool.ruff.lint.isort]
combine-as-imports = true
lines-after-imports = 2

[tool.ruff.format]
quote-style = "double"
